server:
  port: 8081

spring:
  application:
    name: es-mcp-server

  ai:
    mcp:
      server:
        enabled: true
        name: es-mcp-server
        version: 1.0.0
        type: SYNC
        stdio: true
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false

es:
  host: localhost
  port: 9200
  scheme: http

logging:
  level:
    root: INFO
    com.yourcompany.mcp: DEBUG

